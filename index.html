<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info FM - Romania & Moldova</title>
    
    <script src="news_data.js"></script>
    
    <style>
        /* Incarcam fonturile tale locale */
        @font-face {
            font-family: 'CyGrotesk';
            src: url('CyGrotesk-GrandLight.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'LCDPhone';
            src: url('LCDPHONE.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Setari globale */
        html {
            background-color: #050508;
            height: 100%;
        }

        body {
            background: linear-gradient(rgba(5, 5, 8, 0.85), rgba(5, 5, 8, 0.95)), 
                        url('pnt.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'CyGrotesk', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            /* Ascundem bara enervanta de la Google Translate */
            top: 0 !important;
        }

        .skiptranslate {
            display: none !important;
        }

        /* Navigatia de sus */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            flex-wrap: wrap;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 40px; 
            width: auto;
        }

        .nav-brand {
            font-size: 26px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));
        }

        .nav-center {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-center a {
            color: #dddddd;
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-center a:hover {
            color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }

        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 15px;
            color: #aaaaaa;
        }

        .clock {
            font-family: 'LCDPhone', monospace;
            font-size: 28px;
            color: #00ff00;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6), 1px 1px 2px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd93d;
            font-family: 'CyGrotesk', sans-serif;
            font-size: 16px;
        }

        /* Containerul principal */
        .container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            padding: 0 15px 50px 15px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* Butoanele de Limba Moderne */
        .language-menu {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaaaaa;
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'CyGrotesk', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Starea cand butonul e apasat/activ */
        .lang-btn.active {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
            border-color: #00ff00;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.2);
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 45px;
            color: #aaaaaa;
            padding: 0 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Design de Carduri (Stiri) */
        .news-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .news-card:hover {
            background: rgba(20, 20, 20, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .news-country-tag {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888888;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            /* Clasa notranslate impiedica motorul sa traduca si tagul cu tara */
        }

        .news-flag {
            font-size: 16px;
        }

        .news-date {
            font-size: 14px; 
            color: #aaaaaa;
        }

        .news-content {
            font-size: 16px; 
            line-height: 1.6;
            color: #dddddd;
        }

        .highlight { color: #ffffff; }
        .freq-style { color: #ffd93d; }

        .news-content a {
            color: #ffd93d;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .news-content a:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050508; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-right { align-items: center; }
        }
    </style>
</head>
<body>

    <div id="google_translate_element2" style="display:none;"></div>

    <nav class="navbar notranslate">
        <div class="nav-left">
            <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="nav-brand">Dragoș DXing</div>
        </div>
        
        <div class="nav-center">
            <a href="https://dragosdxing.github.io/dragosxding/" target="_blank">HOME</a>
            <a href="https://dragosdxing.github.io/fm-map/" target="_blank">FM Map</a>
            <a href="https://servers.fmdx.org/" target="_blank">Servere TEF</a>
            <a href="https://www.facebook.com/groups/1165433140982652/" target="_blank">Grup Facebook</a>
            <a href="https://dragosconstantin20.blogspot.com/" target="_blank" style="color: #ff6b6b;">Vechiul Blog</a>
        </div>

        <div class="nav-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="weather" id="weather">🌤️ Se caută locația...</div>
        </div>
    </nav>

    <div class="container">
        <h1 class="notranslate">Info FM Updates</h1>

        <img src="cover.png" alt="Info FM Cover" class="hero-image" onerror="this.style.display='none'">

        <div class="language-menu notranslate">
            <button class="lang-btn" onclick="toggleTranslation('en', this)">🇬🇧 ENGLISH</button>
            <button class="lang-btn" onclick="toggleTranslation('de', this)">🇩🇪 GERMAN</button>
            <button class="lang-btn" onclick="toggleTranslation('pl', this)">🇵🇱 POLISH</button>
            <button class="lang-btn" onclick="toggleTranslation('it', this)">🇮🇹 ITALIAN</button>
            <button class="lang-btn" onclick="toggleTranslation('ru', this)">🇷🇺 RUSSIAN</button>
        </div>

        <div class="subtitle">
            Informații legate de concursuri, licențe noi și retrageri ale posturilor radio din România și Republica Moldova.
        </div>

        <div class="news-container" id="news-container">
            </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit2() {
            new google.translate.TranslateElement({pageLanguage: 'ro', autoDisplay: false}, 'google_translate_element2');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit2"></script>

    <script>
        // Logica pentru Butoanele de Limba
        let currentLang = 'ro';

        function toggleTranslation(lang, btnElement) {
            // Daca apesi pe o limba care e deja activa, revenim la Romana (refresh scurt)
            if (currentLang === lang) {
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=" + window.location.hostname + "; path=/;";
                window.location.reload();
                return;
            }

            // Altfel, setam butonul activ si declansam traducerea
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            currentLang = lang;
            
            doGTranslate('ro|' + lang);
        }

        // Hack-ul pentru a declansa selectia ascunsa a motorului Google
        function doGTranslate(lang_pair) {
            if(lang_pair.value) lang_pair = lang_pair.value;
            if(lang_pair == '') return;
            var lang = lang_pair.split('|')[1];
            var teCombo;
            var sel = document.getElementsByTagName('select');
            for (var i = 0; i < sel.length; i++) {
                if (sel[i].className.indexOf('goog-te-combo') != -1) {
                    teCombo = sel[i];
                    break;
                }
            }
            if (document.getElementById('google_translate_element2') == null || document.getElementById('google_translate_element2').innerHTML.length == 0 || teCombo.length == 0 || teCombo.innerHTML.length == 0) {
                setTimeout(function() { doGTranslate(lang_pair) }, 500)
            } else {
                teCombo.value = lang;
                if (typeof(document.createEvent) == 'function') {
                    var evObj = document.createEvent('HTMLEvents');
                    evObj.initEvent('change', true, true);
                    teCombo.dispatchEvent(evObj);
                } else {
                    teCombo.fireEvent('onchange');
                }
            }
        }

        // 2. Incarcare Stiri
        function loadNews() {
            const container = document.getElementById('news-container');
            
            if (typeof NEWS_DB === 'undefined' || NEWS_DB.length === 0) {
                container.innerHTML = "<div class='news-card'>Nu sunt știri momentan în baza de date.</div>";
                return;
            }

            let htmlContent = "";

            NEWS_DB.forEach(news => {
                let flag = "";
                let countryName = "";
                if (news.country === "RO") { flag = "🇷🇴"; countryName = "România"; }
                else if (news.country === "MD") { flag = "🇲🇩"; countryName = "Moldova"; }

                htmlContent += `
                    <div class="news-card">
                        <div class="news-header">
                            <div class="news-country-tag notranslate">
                                <span class="news-flag">${flag}</span>
                                <span>${countryName}</span>
                            </div>
                            <span class="news-date notranslate">${news.date}</span>
                        </div>
                        <div class="news-content">
                            ${news.content}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        }

        // 3. Ceas Live
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ro-RO', { hour12: false });
            document.getElementById('clock').textContent = timeString;
        }

        // 4. Vremea
        function getWeather() {
            const weatherEl = document.getElementById('weather');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await response.json();
                        const temp = data.current_weather.temperature;
                        
                        let oras = "Local";
                        try {
                            const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ro`);
                            const geoData = await geoRes.json();
                            oras = geoData.city || geoData.locality || "Locație activă";
                        } catch (e) {
                            console.log("Locatia nu a putut fi decodata exact.");
                        }

                        weatherEl.innerHTML = `📍 ${oras} | 🌡️ ${temp}°C`;
                    } catch (error) {
                        weatherEl.innerHTML = `❌ Eroare conexiune`;
                    }
                }, function(error) {
                    weatherEl.innerHTML = `📍 Locație ascunsă`;
                });
            } else {
                weatherEl.innerHTML = `Nu este suportat`;
            }
        }

        // Executam scripturile la incarcarea paginii
        window.onload = function() {
            loadNews();
            setInterval(updateClock, 1000);
            updateClock();
            getWeather();
        };
    </script>

</body>
</html>
