<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info FM - Romania & Moldova</title>
    <script src="news_data.js"></script>
    
    <style>
        body {
            background-color: #000000; /* Negru pur, stil profesional */
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px; /* Putin padding pt mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            text-decoration: underline;
            text-underline-offset: 6px;
            margin-top: 20px;
            margin-bottom: 25px;
            font-weight: normal;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
            box-shadow: 0 4px 15px rgba(0,255,0,0.1); /* Efect usor verde */
        }

        .language-menu {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            font-size: 15px;
            letter-spacing: 1px;
            color: #aaaaaa;
        }

        .language-menu span {
            cursor: pointer;
            transition: color 0.2s;
        }
        .language-menu span:hover { color: #00ff00; }

        .subtitle {
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #bbbbbb;
            padding: 0 10px;
            text-transform: uppercase; /* Totul cu litere mari */
        }

        /* Sectiunea de stiri - stil listă */
        .news-container {
            padding-left: 10px;
            padding-right: 10px;
        }

        .news-item {
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.7;
            color: #dddddd;
            display: flex; /* Pt a alinia punctul si textul */
            align-items: flex-start;
        }

        .news-item::before {
            content: "•";
            color: #ffffff; /* Punct alb */
            font-weight: bold;
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }

        .news-date {
            font-weight: normal;
            color: #ffffff;
        }

        /* Clase pentru culori in text */
        .highlight {
            color: #00ff00; /* Verde neon pt posturi */
            font-weight: bold;
        }
        .freq-style {
            color: #ffd93d; /* Galben pt frecvente */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>INFO FM FROM ROMANIA & MOLDOVA</h1>

    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhx8vJb0RvvLKwHx_1cD-bmHmP_FpZB2Dpo_OV-Q-diVrvKkuIafxKvju4lar6lq-0MRn5XxzauwuPganRVeJuFWzrmO2oRHCtn9gzoIn46c0z29IJsJsoaTRHJEWfbyTtr1ieuXWFp4vn-4em36CnuuDUfRMKdL2-QDZIV8Pd8JA0DYIffFKLAMjXtWQ0/s4096/IMG_20260105_160434.png" alt="Info FM Hero" class="hero-image">

    <div class="language-menu">
        <span>ENGLI<span style="color: #ff6b6b;">S</span>H</span>
        <span>GER<span style="color: #ffd93d;">M</span>AN</span>
        <span>POLISH</span>
        <span>ITALI<span style="color: #6bcb77;">A</span>N</span>
        <span>RUSSI<span style="color: #ff6b6b;">A</span>N</span>
    </div>

    <div class="subtitle">
        AICI GĂSEȘTI INFORMAȚII LEGATE DE CONCURSURI, LICENȚE NOI ȘI RETRAGERI ALE POSTURILOR RADIO DIN ROMÂNIA ȘI REPUBLICA MOLDOVA
    </div>

    <div class="news-container" id="news-container">
        </div>
</div>

<script>
    // Functie care incarca stirile din news_data.js si le randeaza pe ecran
    function loadNews() {
        const container = document.getElementById('news-container');
        
        if (typeof NEWS_DB === 'undefined' || NEWS_DB.length === 0) {
            container.innerHTML = "<div class='news-item'>Nu sunt știri momentan în baza de date. Adaugă-le în news_data.js!</div>";
            return;
        }

        let htmlContent = "";

        // Rulăm prin știri (revers ca să fie cea mai nouă sus)
        [...NEWS_DB].reverse().forEach(news => {
            // Definim steagul in functie de tara
            let flag = "";
            if (news.country === "RO") flag = "🇷🇴";
            else if (news.country === "MD") flag = "🇲🇩";

            // Construim HTML-ul pentru fiecare stire
            htmlContent += `
                <div class="news-item">
                    <span>
                        <span class="news-date">${news.date} (${flag}):</span> ${news.content}
                    </span>
                </div>
            `;
        });

        container.innerHTML = htmlContent;
    }

    // Rulam functia cand se incarca pagina
    window.onload = loadNews;
</script>

</body>
</html>
