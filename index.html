<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info FM - Romania & Moldova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="news_data.js"></script>
    
    <style>
        body {
            /* Gradient modern pe fundal, fixat sa nu se miste cand dai scroll */
            background: radial-gradient(circle at 50% 0%, #1a1e29 0%, #050508 70%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-top: 25px;
            margin-bottom: 25px;
            /* Text cu gradient verde */
            background: linear-gradient(90deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            display: block;
            box-shadow: 0 8px 30px rgba(0, 255, 0, 0.15);
        }

        .button-container {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Butonul modern pentru Harta FM */
        .map-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(45deg, #00ff00, #00aa00);
            color: #000;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
            border: 1px solid #00ff00;
        }

        .map-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 0, 0.5);
            background: linear-gradient(45deg, #00aa00, #00ff00);
        }

        .language-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #888888;
        }

        .language-menu span {
            cursor: pointer;
            transition: color 0.2s;
        }
        .language-menu span:hover { color: #ffffff; }

        .subtitle {
            text-align: center;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #a0a0a0;
            padding: 0 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Design de Carduri pentru Stiri */
        .news-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .news-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
            border-left: 4px solid #ffd93d; /* Se face galben la hover */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .news-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .news-flag {
            font-size: 20px;
        }

        .news-date {
            font-size: 14px;
            color: #aaaaaa;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .news-content {
            font-size: 15px;
            line-height: 1.7;
            color: #e0e0e0;
        }

        /* Clase pentru culori in text, injectate din JS */
        .highlight {
            color: #00ff00;
            font-weight: 600;
        }
        .freq-style {
            color: #ffd93d;
            font-weight: 600;
            background: rgba(255, 217, 61, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Link-urile din interiorul stirilor */
        .news-content a {
            color: #00ff00;
            text-decoration: none;
            border-bottom: 1px solid #00ff00;
            transition: color 0.2s, border-bottom 0.2s;
        }
        .news-content a:hover {
            color: #ffd93d;
            border-bottom: 1px solid #ffd93d;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="cover.png" alt="Info FM Cover" class="hero-image" onerror="this.style.display='none'">

    <div class="button-container">
        <a href="https://dragosdxing.github.io/fm-map/" target="_blank" class="map-btn">
            🗺️ DESCHIDE HARTA FM INTERACTIVĂ
        </a>
    </div>

    <div class="language-menu">
        <span>ENGLI<span style="color: #ff6b6b;">S</span>H</span>
        <span>GER<span style="color: #ffd93d;">M</span>AN</span>
        <span>POLISH</span>
        <span>ITALI<span style="color: #6bcb77;">A</span>N</span>
        <span>RUSSI<span style="color: #ff6b6b;">A</span>N</span>
    </div>

    <div class="subtitle">
        INFORMAȚII LEGATE DE CONCURSURI, LICENȚE NOI ȘI RETRAGERI ALE POSTURILOR RADIO DIN ROMÂNIA ȘI REPUBLICA MOLDOVA.
    </div>

    <div class="news-container" id="news-container">
        </div>
</div>

<script>
    function loadNews() {
        const container = document.getElementById('news-container');
        
        if (typeof NEWS_DB === 'undefined' || NEWS_DB.length === 0) {
            container.innerHTML = "<div class='news-card'>Nu sunt știri momentan în baza de date.</div>";
            return;
        }

        let htmlContent = "";

        // Preluam datele din fisier exact in ordinea in care sunt scrise (cele mai noi primele)
        NEWS_DB.forEach(news => {
            let flag = "";
            if (news.country === "RO") flag = "🇷🇴";
            else if (news.country === "MD") flag = "🇲🇩";

            // Design-ul modern de Card
            htmlContent += `
                <div class="news-card">
                    <div class="news-header">
                        <span class="news-flag">${flag}</span>
                        <span class="news-date">${news.date}</span>
                    </div>
                    <div class="news-content">
                        ${news.content}
                    </div>
                </div>
            `;
        });

        container.innerHTML = htmlContent;
    }

    window.onload = loadNews;
</script>

</body>
</html>
