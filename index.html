<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info FM - Romania & Moldova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="news_data.js"></script>
    
    <style>
        /* Modernizare generala bazata pe referinta */
        body {
            /* Pasul 1: Inseram pnt.jpg ca background */
            /* Adaugam si un overlay negru (linear-gradient) ca sa se poata citi textul */
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('pnt.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding-bottom: 50px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 30px;
            margin-bottom: 30px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .button-container {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Buton modernizat, integrat in design */
        .map-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #111111 0%, #333333 100%);
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .map-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 0, 0.3);
            border: 1px solid rgba(0, 255, 0, 0.5);
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
        }

        .language-menu {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #888888;
        }

        .language-menu span {
            cursor: pointer;
            transition: color 0.2s;
            text-transform: uppercase;
        }
        
        /* Efectul de litera colorata apare doar la hover, stil Pro */
        .language-menu span:hover { color: #ffffff; }

        .subtitle {
            text-align: center;
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 45px;
            color: #aaaaaa;
            padding: 0 20px;
            text-transform: uppercase;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Design Modern de Carduri (Stiri) */
        .news-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            background: rgba(15, 15, 15, 0.7); /* Translucid si inchis */
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .news-card:hover {
            background: rgba(20, 20, 20, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 255, 0, 0.2);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .news-country-tag {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888888;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .news-flag {
            font-size: 16px;
        }

        .news-date {
            font-size: 13px;
            color: #aaaaaa;
            font-weight: 400;
        }

        .news-content {
            font-size: 15px;
            line-height: 1.8;
            color: #dddddd;
            font-weight: 400;
        }

        /* Culori in text din news_data.js - pastrate dar mai subtile */
        .highlight {
            color: #ffffff; /* Text alb pt posturi */
            font-weight: 600;
        }
        
        .freq-style {
            color: #ffd93d; /* Galben pt frecvente, fara fundal exagerat */
            font-weight: 600;
        }

        /* Link-uri stilizate Pro */
        .news-content a {
            color: #ffd93d;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .news-content a:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }

        /* Scrollbar stilizat Pro */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050508; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }
        
    </style>
</head>
<body>

<div class="container">
    <h1>Info FM Updates</h1>

    <img src="cover.png" alt="Info FM Cover" class="hero-image" onerror="this.style.display='none'">

    <div class="button-container">
        <a href="https://dragosdxing.github.io/fm-map/" target="_blank" class="map-btn">
            🗺️ Deschide Harta FM Interactivă
        </a>
    </div>

    <div class="language-menu">
        <span>ENGLI<span style="color: #ff6b6b;">S</span>H</span>
        <span>GER<span style="color: #ffd93d;">M</span>AN</span>
        <span>POLISH</span>
        <span>ITALI<span style="color: #6bcb77;">A</span>N</span>
        <span>RUSSI<span style="color: #ff6b6b;">A</span>N</span>
    </div>

    <div class="subtitle">
        Informații legate de concursuri, licențe noi și retrageri ale posturilor radio din România și Republica Moldova.
    </div>

    <div class="news-container" id="news-container">
        </div>
</div>

<script>
    function loadNews() {
        const container = document.getElementById('news-container');
        
        if (typeof NEWS_DB === 'undefined' || NEWS_DB.length === 0) {
            container.innerHTML = "<div class='news-card'>Nu sunt știri momentan în baza de date.</div>";
            return;
        }

        let htmlContent = "";

        // Preluam datele (noi primele conform news_data.js)
        NEWS_DB.forEach(news => {
            let flag = "";
            let countryName = "";
            if (news.country === "RO") { flag = "🇷🇴"; countryName = "România"; }
            else if (news.country === "MD") { flag = "🇲🇩"; countryName = "Moldova"; }

            // Structura moderna de Card tip Pro
            htmlContent += `
                <div class="news-card">
                    <div class="news-header">
                        <div class="news-country-tag">
                            <span class="news-flag">${flag}</span>
                            <span>${countryName}</span>
                        </div>
                        <span class="news-date">${news.date}</span>
                    </div>
                    <div class="news-content">
                        ${news.content}
                    </div>
                </div>
            `;
        });

        container.innerHTML = htmlContent;
    }

    window.onload = loadNews;
</script>

</body>
</html>
