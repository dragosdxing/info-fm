<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragoș DXing - Home</title>
    
    <style>
        /* Incarcam fonturile tale locale */
        @font-face {
            font-family: 'CyGrotesk';
            src: url('CyGrotesk-GrandLight.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'LCDPhone';
            src: url('LCDPHONE.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* REZOLVAREA GOLULUI ALB DE JOS */
        html {
            background-color: #050508; /* Fundal inchis de rezerva */
            height: 100%;
        }

        /* Fundal cu poza ta si filtru intunecat */
        body {
            background: linear-gradient(rgba(5, 5, 8, 0.85), rgba(5, 5, 8, 0.95)), 
                        url('pnt.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'CyGrotesk', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh; /* Asta forteaza background-ul sa se intinda pana jos! */
            -webkit-font-smoothing: antialiased;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* Navigatia de sus (Glassmorphism) */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            flex-wrap: wrap; /* Pentru mobile */
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 40px; 
            width: auto;
        }

        .nav-brand {
            font-size: 26px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));
        }

        .nav-center {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-center a {
            color: #dddddd;
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-center a:hover {
            color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
        }

        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 15px;
            color: #aaaaaa;
        }

        /* Setari pentru noul font LCD */
        .clock {
            font-family: 'LCDPhone', monospace;
            font-size: 28px;
            color: #00ff00;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6), 1px 1px 2px rgba(0,0,0,0.8);
            margin-bottom: 5px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd93d;
            font-family: 'CyGrotesk', sans-serif;
            font-size: 16px;
        }

        /* Sectiunea Principala */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .welcome-title {
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #aaaaaa;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        /* Sectiunea YouTube */
        .yt-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .yt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .yt-title {
            font-size: 24px;
            color: #ff0000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .yt-btn {
            background: #ff0000;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-shadow: none;
        }

        .yt-btn:hover {
            background: #cc0000;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
            transform: translateY(-2px);
        }

        /* Wrapper pt iframe ca sa ramana perfect proportional */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Raport 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Responsiveness pentru mobile */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-right { align-items: center; }
            .welcome-title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="nav-brand">Dragoș DXing</div>
        </div>
        
        <div class="nav-center">
            <a href="https://dragosdxing.github.io/info-fm/" target="_blank">Info FM</a>
            <a href="https://dragosdxing.github.io/fm-map/" target="_blank">FM Map</a>
            <a href="https://servers.fmdx.org/" target="_blank">Servere TEF</a>
            <a href="https://www.facebook.com/groups/1165433140982652/" target="_blank">Grup Facebook</a>
            <a href="https://dragosconstantin20.blogspot.com/" target="_blank" style="color: #ff6b6b;">Vechiul Blog</a>
        </div>

        <div class="nav-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="weather" id="weather">🌤️ Se caută locația...</div>
        </div>
    </nav>

    <div class="main-container">
        <div class="welcome-title">Bine ai venit pe Hub-ul DXing</div>
        <div class="welcome-subtitle">Explorarea spectrului radio FM din România și Republica Moldova</div>

        <div class="yt-section">
            <div class="yt-header">
                <div class="yt-title">
                    ▶️ CELE MAI NOI CLIPURI
                </div>
                <a href="https://www.youtube.com/@dragosdxing?sub_confirmation=1" target="_blank" class="yt-btn">
                    Abonează-te pe YouTube
                </a>
            </div>
            
            <div class="video-container">
                <iframe width="1345" height="759" src="https://www.youtube.com/embed/sw_1-6ULZck" title="10 LUCRURI IMPORTANTE IN FM DX / 10 IMPORTANT THINGS IN FM DX" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Script pentru Ceas Live ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ro-RO', { hour12: false });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. Script pentru Vreme si Locatie ---
        function getWeather() {
            const weatherEl = document.getElementById('weather');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await response.json();
                        const temp = data.current_weather.temperature;
                        
                        let oras = "Local";
                        try {
                            const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ro`);
                            const geoData = await geoRes.json();
                            oras = geoData.city || geoData.locality || "Locație activă";
                        } catch (e) {
                            console.log("Locatia nu a putut fi decodata exact.");
                        }

                        weatherEl.innerHTML = `📍 ${oras} | 🌡️ ${temp}°C`;
                    } catch (error) {
                        weatherEl.innerHTML = `❌ Eroare conexiune`;
                    }
                }, function(error) {
                    weatherEl.innerHTML = `📍 Locație ascunsă`;
                });
            } else {
                weatherEl.innerHTML = `Nu este suportat`;
            }
        }
        
        getWeather();
    </script>

</body>
</html>
