<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Info FM</title>
    <style>
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-panel {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h2 { text-align: center; color: #00ff00; margin-top: 0; }
        label { display: block; margin-top: 15px; color: #aaaaaa; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
            color-scheme: dark;
        }
        textarea { height: 150px; resize: vertical; }
        input:focus, textarea:focus { border-color: #00ff00; outline: none; }
        
        input[readonly] {
            background: rgba(255, 255, 255, 0.02);
            color: #666;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
        }

        /* Butonul mare de publicare */
        #publishBtn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #00cc00;
            color: #000;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        #publishBtn:hover { background: #00ff00; }

        /* Bara cu butoane de formatare */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00ff00;
        }

        .settings-group {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: #00ff00; }
        .error { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>🛠️ Info FM - Publicare Știri</h2>

        <div class="settings-group">
            <label>Nume Repository (Blocat):</label>
            <input type="text" id="repoName" value="info-fm" readonly> 
            
            <label>GitHub Token (începe cu ghp_...):</label>
            <input type="password" id="githubToken" placeholder="Introdu token-ul aici...">
        </div>

        <label>Țara:</label>
        <select id="newsCountry">
            <option value="RO">🇷🇴 România</option>
            <option value="MD">🇲🇩 Moldova</option>
        </select>

        <label>Data:</label>
        <input type="date" id="newsDate">

        <label>Conținut Știre:</label>
        <div class="toolbar">
            <button type="button" class="tool-btn" onclick="addLink()">🔗 Adaugă Link</button>
            <button type="button" class="tool-btn" onclick="addBold()"><b>B</b> Îngroșat (Bold)</button>
        </div>
        <textarea id="newsContent" placeholder="Scrie știrea aici..."></textarea>

        <button type="button" onclick="publishNews()" id="publishBtn">Publică Știrea</button>
        
        <div id="status"></div>
    </div>

    <script>
        // Setează automat data de azi în calendar
        const azi = new Date();
        const zi = String(azi.getDate()).padStart(2, '0');
        const luna = String(azi.getMonth() + 1).padStart(2, '0');
        const an = azi.getFullYear();
        document.getElementById('newsDate').value = `${an}-${luna}-${zi}`;

        // ==========================================
        // FUNCȚII PENTRU BUTOANELE DE FORMATARE
        // ==========================================
        function addLink() {
            const textarea = document.getElementById('newsContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);

            if (!selectedText) {
                alert("Te rog să selectezi mai întâi textul pe care vrei să pui link-ul!");
                return;
            }

            const url = prompt("Introdu link-ul (URL-ul):", "https://");
            if (url && url !== "https://") {
                const linkCode = `<a href="${url}" target="_blank">${selectedText}</a>`;
                textarea.setRangeText(linkCode, start, end, 'end');
                textarea.focus(); // Pune cursorul înapoi în căsuță
            }
        }

        function addBold() {
            const textarea = document.getElementById('newsContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);

            if (!selectedText) {
                alert("Te rog să selectezi mai întâi textul pe care vrei să-l îngroși!");
                return;
            }

            const boldCode = `<b>${selectedText}</b>`;
            textarea.setRangeText(boldCode, start, end, 'end');
            textarea.focus();
        }
